<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OL and UL Example</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        h1 {
            text-align: center;
            color: white;
            text-shadow: 2px 2px 5px black;
        }

        ol {
            max-width: 600px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        li {
            font-size: 18px;
            margin: 10px 0;
        }

        ul {
            margin-top: 10px;
        }

        ul li {
            background: #f1f1f1;
            margin: 5px 0;
            padding: 8px;
            border-radius: 5px;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            color: white;
            background-color: #007BFF;
            padding: 10px;
            width: 200px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 5px;
            transition: 0.3s;
        }

        a:hover {
            background-color: #0056b3;
        }
    </style>

</head>
<body>

    <h1>My Lists Example</h1>

    <ol>
        <li>Frontend Development
            <ul>
                <li>HTML</li>
                <li>CSS</li>
                <li>JavaScript</li>
            </ul>
        </li>

        <li>Tools
            <ul>
                <li>Git</li>
                <li>GitHub</li>
                <li>VS Code</li>
            </ul>
        </li>
    </ol>

    <p><a href="../assignment/home.html">return to home page</a></p>
    <p>
        <a href="../assignment/ol.html">Return to without css</a>
    </p>

</body>
</html>
