<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Styled Page</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #4facfe, #00f2fe);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        text-align: center;
        width: 350px;
    }

    h2 {
        color: #333;
        margin-bottom: 15px;
    }

    p {
        color: #555;
        font-size: 16px;
        margin: 15px 0;
    }

    a {
        display: inline-block;
        text-decoration: none;
        background: #4facfe;
        color: white;
        padding: 10px 15px;
        border-radius: 8px;
        transition: 0.3s;
    }

    a:hover {
        background: #0077ff;
        transform: scale(1.05);
    }

    /* Tooltip enhancement */
    [title] {
        cursor: pointer;
    }
</style>

</head>
<body>

<div class="container">
    <h2 title="I'm a Natien Sharma">The Title Attribute</h2>

    <p title="I'm a tooltip">
        Mouse over this paragraph to display the title attribute as a tooltip.
    </p>

    <a href="../assignment/home.html">Return to Home Page</a>
</div>

</body>
</html>
