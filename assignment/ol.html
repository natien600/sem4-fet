<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OL and UL Example</title>
</head>
<body>

    <h1>My Lists Example</h1>

    <h2>Unordered List (UL)</h2>
    <ul>
        <li>Apple</li>
        <li>Banana</li>
        <li>Cherry</li>
    </ul>

    <h2>Ordered List (OL)</h2>
    <ol>
        <li>Wake up</li>
        <li>Brush Teeth</li>
        <li>Have Breakfast</li>
        <li>Go to School</li>
    </ol>

    <h2>My Image</h2>
    <img src="n.jpg" alt="Sample Image" width="300">
